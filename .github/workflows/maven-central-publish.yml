name: Publish package to the Maven Central Repository
permissions:
  contents: read
on:
  release:
    types: [created]
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          # to prevent "no default secret key: No secret key"
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Set version (from release tag)
        run: mvn versions:set -DnewVersion=${{ github.event.release.tag_name }}

      - name: Publish to repo
        run: mvn --batch-mode -DskipTests -Psign-artifacts deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - name: Monitor Snyk for vulnerabilities in code 📦
        uses: snyk/actions/maven-3-jdk-21@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
        with:
          # run the Snyk CLI's `monitor` for a Maven aggregated project
          args: monitor --maven-aggregate-project --severity-threshold=high --project-tags=tag=${{ github.event.release.tag_name }}
